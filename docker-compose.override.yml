services:
  admin-panel:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: admin-panel-dev
    networks:
      - web-network
    volumes:
      - .:/app
      - admin-node-modules:/app/node_modules
      - .next:/app/.next
      - ./invoices:/app/invoices
      - ./contracts:/app/contracts
      - ./quotes:/app/quotes
    env_file:
      - .env
    environment:
      NODE_ENV: development
      INVOICES_DIR: /app/invoices
      CONTRACTS_DIR: /app/contracts
      QUOTES_DIR: /app/quotes

volumes:
  admin-node-modules:

networks:
  web-network:
    external: true