services:
  admin-panel:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: admin-panel
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - web-network
    # Variables .env: ADMIN_API_URL, ADMIN_API_KEY, TAILSCALE_*, etc.
    environment:
      - NODE_ENV=production
      - ADMIN_API_URL=${ADMIN_API_URL:-http://admin-api:3000}
      - ADMIN_API_KEY=${ADMIN_API_KEY}

networks:
  web-network:
    external: true