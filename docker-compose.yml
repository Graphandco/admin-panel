services:
  admin-panel:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: admin-panel
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - web-network
    # Les variables .env (ADMIN_API_URL, TAILSCALE_API_URL, TAILSCALE_API_KEY, etc.)
    # sont chargées via env_file. Override uniquement si nécessaire.
    environment:
      NODE_ENV: production

networks:
  web-network:
    external: true